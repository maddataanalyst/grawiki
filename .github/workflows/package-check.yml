name: Package check

on:
  push:
    branches:
      - main
      - sanitized
  pull_request:

jobs:
  package-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build wheel and sdist
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

      - name: Smoke test base wheel install
        run: |
          python -m venv .venv-base
          .venv-base/bin/python -m pip install --upgrade pip
          .venv-base/bin/python -m pip install dist/*.whl
          .venv-base/bin/python -c "import grawiki"

      - name: Smoke test FalkorDBLite extra install
        run: |
          python -m venv .venv-falkordblite
          .venv-falkordblite/bin/python -m pip install --upgrade pip
          WHEEL_URI="$(python -c \"from pathlib import Path; print(next(Path('dist').glob('*.whl')).resolve().as_uri())\")"
          .venv-falkordblite/bin/python -m pip install "grawiki[falkordblite] @ ${WHEEL_URI}"
          .venv-falkordblite/bin/python -c "from grawiki.db import FalkorGraphDB; print(FalkorGraphDB.__name__)"
