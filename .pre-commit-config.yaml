repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        files: ^(main\.py|src/.*\.py)$
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        files: ^(main\.py|src/.*\.py)$
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
